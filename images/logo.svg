<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <linearGradient id="pill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#d1fae5"/>
    </linearGradient>
  </defs>
  <!-- Background Circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg)"/>
  <!-- Pill Shape -->
  <ellipse cx="64" cy="64" rx="35" ry="18" fill="url(#pill)" transform="rotate(-30 64 64)"/>
  <!-- Pill Divider -->
  <line x1="64" y1="50" x2="64" y2="78" stroke="#064e3b" stroke-width="3" stroke-linecap="round" transform="rotate(-30 64 64)"/>
  <!-- Pharmacy Cross (small) -->
  <rect x="58" y="82" width="12" height="4" rx="1" fill="#ffffff" opacity="0.9"/>
  <rect x="62" y="78" width="4" height="12" rx="1" fill="#ffffff" opacity="0.9"/>
</svg>
